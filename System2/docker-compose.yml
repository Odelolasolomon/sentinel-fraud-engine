version: '3.8'

# Enterprise Fraud Prevention: System 2 (Continuous Auth & Biometrics)
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend/data:/app/data
      - .backend/app.db:/app/app.db
    environment:
      - SECRET_KEY=A_VERY_SECRET_KEY_FOR_JWT_OR_CHALLENGES
      - BACKEND_CORS_ORIGINS=["*"]
      - SQLALCHEMY_DATABASE_URL=sqlite:///./app.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:80"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: always
